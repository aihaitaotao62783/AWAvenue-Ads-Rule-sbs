name: Compile Sing-box Rules
on:
  push:
    branches: [ main ] # 如果你的主分支叫 master，请修改此处
    paths:
      - 'Filters/*.json' # 只有当 Filters 文件夹下的 json 变动时才触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Sing-Box
        run: |
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=${TAG#v}
          URL="https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          curl -L $URL -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box ./sing-box

      - name: Compile Rules
        run: |
          # 进入 Filters 文件夹处理
          cd Filters
          for file in *.json; do
            if [ -f "$file" ]; then
              ../sing-box rule-set compile "$file" -o "${file%.json}.srs"
              echo "✅ Compiled $file to ${file%.json}.srs"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Filters/*.srs
          # 检查是否有文件更改，避免没有变化时报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update binary rule sets" && git push)
